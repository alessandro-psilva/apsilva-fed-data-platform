server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|json|svg|png|jpg|jpeg|gif|ico)$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
}
